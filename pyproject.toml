# pyproject.toml — apenas configuração de ferramentas locais (pytest, mypy, etc.)
# Dependências de runtime declaradas em requirements.txt para compatibilidade
# com Streamlit Cloud, que usa `pip install -r requirements.txt`.

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["."]
include = ["app*", "src*", "migrations*"]
